version: "3.8"
services:
  modelhub-api:
    build: ./backend
    container_name: modelhub-api-dev
    ports:
      - "127.0.0.1:8950:8000"
    volumes:
      - ./backend:/app
      - /Users/yinghaowang/HurricaneCore/docker-data/modelhub/db:/app/data
    restart: unless-stopped
    networks:
      - squid_dev_network

  modelhub-web:
    image: node:20-alpine
    container_name: modelhub-web-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3950"
    ports:
      - "127.0.0.1:3950:3950"
    restart: unless-stopped
    networks:
      - squid_dev_network

networks:
  squid_dev_network:
    external: true
