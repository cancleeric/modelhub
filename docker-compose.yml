version: "3.8"
services:
  modelhub-api:
    build: ./backend
    container_name: modelhub-api-dev
    ports:
      - "127.0.0.1:8950:8000"
    volumes:
      - ./backend:/app
      - /Users/yinghaowang/HurricaneCore/docker-data/modelhub/db:/app/data
      - /Users/yinghaowang/HurricaneCore/docker-data/modelhub/models:/app/data/models
      # Sprint 6.1: Kaggle credential（host 若沒有該檔會 bind 空目錄，poller 會自動 skip）
      - /Users/yinghaowang/HurricaneCore/docker-data/modelhub/kaggle:/root/.kaggle:ro
    environment:
      # 安全性：請設定非預設值。取得方式：hvault get hurricanecore/dev/MODELHUB_API_KEY
      - MODELHUB_API_KEY=${MODELHUB_API_KEY:-modelhub-dev-key-2026}
      - MODELHUB_KAGGLE_POLL_INTERVAL=60
      - MODELHUB_GPU_USD_PER_HOUR=0.5
      # ANEMONE_API_TOKEN: 從 Hurricane Vault 取得 (hurricanecore/dev/ANEMONE_API_TOKEN)
      # 設定方式：hvault run --prefix "hurricanecore/dev/" -- docker-compose up
      # 或在 docker-compose.override.yml 中覆寫此值
      - ANEMONE_API_TOKEN=${ANEMONE_API_TOKEN:-}
      # DATABASE_URL: 從 Hurricane Vault 取得 (hurricanecore/dev/MODELHUB_DATABASE_URL)
      # 未設時使用 SQLite（預設值）；PostgreSQL 格式：postgresql://user:pass@host:5432/dbname
      - DATABASE_URL=${DATABASE_URL:-}
    restart: unless-stopped
    networks:
      - squid_dev_network

  modelhub-web:
    image: node:20-alpine
    container_name: modelhub-web-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3950"
    ports:
      - "127.0.0.1:3950:3950"
    restart: unless-stopped
    networks:
      - squid_dev_network

networks:
  squid_dev_network:
    external: true
